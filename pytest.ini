[pytest]
minversion = 7.0
addopts = --cov-config=.coveragerc --verbose --junitxml=junit.xml --cov=meanfi
    --cov-report term --cov-report html --cov-report xml --ruff
testpaths = meanfi
required_plugins = pytest-randomly pytest-cov pytest-ruff pytest-repeat
markers =
    physics: exact-limit, symmetry, and reference-physics tests.
    numerics: tolerance-calibration and oracle-driven numerical-accuracy tests.
    integration: public workflow, interop, and contract tests.
    performance: runtime, memory, and operation-count checks.
    perf_slow: heavier scaling checks excluded from the default test task.
    native: requires the native zero-temperature extension.
