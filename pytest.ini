[pytest]
minversion = 7.0
addopts = --cov-config=.coveragerc --verbose --junitxml=build/test-reports/junit.xml --cov=meanfi
    --cov-report term --cov-report html:build/test-reports/htmlcov --cov-report xml:build/test-reports/coverage.xml --ruff
testpaths = meanfi
required_plugins = pytest-randomly pytest-cov pytest-ruff
cache_dir = build/test-reports/.pytest_cache
markers =
    physics: exact-limit, symmetry, and reference-physics tests.
    numerics: tolerance-calibration and oracle-driven numerical-accuracy tests.
    integration: public workflow, interop, and contract tests.
    perf_slow: heavier scaling checks that are excluded from the default test task.
    ext: requires the compiled zero-temperature extension.
